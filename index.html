<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>

  <style>
    body{
      font-family: Arial;
      background:#f3f4f6;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .chat-container{
      width:400px;
      background:white;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.2);
    }

    .header{
      background:#4f46e5;
      color:white;
      padding:15px;
      text-align:center;
      font-weight:bold;
    }

    .chat-box{
      height:400px;
      overflow-y:auto;
      padding:15px;
    }

    .message{
      margin-bottom:15px;
      padding:10px;
      border-radius:10px;
    }

    .user{
      background:#4f46e5;
      color:white;
      text-align:right;
    }

    .bot{
      background:#e5e7eb;
    }

    .input-area{
      display:flex;
      border-top:1px solid #ddd;
    }

    input{
      flex:1;
      padding:15px;
      border:none;
      outline:none;
    }

    button{
      padding:15px;
      border:none;
      background:#4f46e5;
      color:white;
      cursor:pointer;
    }
  </style>
</head>
<body>

<div class="chat-container">

  <div class="header">
    AI Chatbot
  </div>

  <div class="chat-box" id="chatBox">
    <div class="message bot">
      Halo 👋 Ada yang bisa saya bantu?
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ketik pesan...">
    <button onclick="sendMessage()">Kirim</button>
  </div>

</div>

<script>

const chatBox = document.getElementById('chatBox');

async function sendMessage(){

  const input = document.getElementById('userInput');

  const message = input.value;

  if(message.trim() === '') return;

  addMessage(message, 'user');

  input.value = '';

  // loading
  const loadingDiv = addMessage("AI sedang mengetik...", 'bot');

  try{

    const response = await fetch('https://chatbot-bert.onrender.com/chat', {
      method:'POST',
      headers:{
        'Content-Type':'application/json'
      },
      body: JSON.stringify({
        message: message
      })
    });

    const data = await response.json();

    loadingDiv.remove();

    addMessage(`
      ${data.response}
      <br><br>
      <small>Similarity: ${data.similarity}%</small>
    `, 'bot');

  }catch(error){

    loadingDiv.remove();

    addMessage(`
      Gagal terhubung ke AI server 😅
      <br><br>
      Kemungkinan:
      <br>
      • Backend Render mati/sleep
      <br>
      • URL backend salah
      <br>
      • Render masih loading model AI
    `, 'bot');

    console.error(error);
  }
}

function addMessage(text, sender){

  const div = document.createElement('div');

  div.classList.add('message', sender);

  div.innerHTML = text;

  chatBox.appendChild(div);

  chatBox.scrollTop = chatBox.scrollHeight;

  return div;
}

</script>

</body>
</html>
